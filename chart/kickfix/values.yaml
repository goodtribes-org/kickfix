frontend:
  image:
    repository: ghcr.io/viodlar/kickfix/frontend
    tag: main
  replicaCount: 1
  service:
    port: 3000
  env:
    REACT_APP_API_URL: "https://api.kickfix.se/api"

backend:
  image:
    repository: ghcr.io/viodlar/kickfix/backend
    tag: main
  replicaCount: 1
  service:
    port: 5000
  env:
    JWT_SECRET: ""
    FRONTEND_URL: "https://www.kickfix.se,https://kickfix.se"
    PORT: "5000"
  uploads:
    size: 1Gi

mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "7"
  storage:
    size: 5Gi
  auth:
    enabled: false

ingress:
  enabled: true
  className: nginx
  frontendHosts:
    - www.kickfix.se
    - kickfix.se
  backendHost: api.kickfix.se
  tls:
    enabled: true
    secretName: kickfix-tls
    clusterIssuer: letsencrypt-prod
