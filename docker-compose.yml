services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["mongod", "--replSet", "rs0"]
    healthcheck:
      test: |
        mongosh --eval "
        try { rs.status().ok } catch(e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
          1;
        }"
      interval: 5s
      start_period: 10s



  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/workapp?replicaSet=rs0&directConnection=true
      - JWT_SECRET=workapp_secret_key_2024
      - FRONTEND_URL=http://localhost:3003
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "3003:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules


volumes:
  mongo-data:
  uploads:
